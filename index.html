<style>
  :root{
    --cy:#34e3ff; --cy-deep:#0b8aa8; --mag:#ff3ea5; --amber:#ffb13c; --good:#27ff9e;
    --bg0:#03060d; --bg1:#081320; --panel:rgba(9,22,34,.72); --panel2:rgba(14,30,46,.85);
    --ink:#dff6ff; --muted:#6f93ab;
    --line:rgba(52,227,255,.28); --line-soft:rgba(52,227,255,.14);
    --cut:12px; --radius:6px;
    --fhead:'Orbitron',system-ui,sans-serif; --fbody:'Rajdhani',system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;min-height:100%}
  html{background:var(--bg0)}
  body{
    font-family:var(--fbody); color:var(--ink); overflow-x:hidden; position:relative;
    background-color:var(--bg0);
    background-image:radial-gradient(1200px 760px at 50% -8%, #0c2236 0%, var(--bg1) 42%, var(--bg0) 100%);
    background-attachment:fixed; background-repeat:no-repeat;
  }
  /* grid + scanlines + vignette overlays */
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:
      linear-gradient(rgba(52,227,255,.06) 1px,transparent 1px),
      linear-gradient(90deg, rgba(52,227,255,.06) 1px,transparent 1px);
    background-size:46px 46px;
    mask-image:radial-gradient(circle at 50% 30%, #000 40%, transparent 92%);
    -webkit-mask-image:radial-gradient(circle at 50% 30%, #000 40%, transparent 92%);
    animation:gridDrift 24s linear infinite;
  }
  @keyframes gridDrift{to{background-position:46px 92px,92px 46px}}
  body::after{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:60;
    background:repeating-linear-gradient(to bottom, rgba(0,0,0,0) 0 2px, rgba(0,0,0,.16) 2px 3px);
    mix-blend-mode:multiply;opacity:.5;
  }
  button{font-family:var(--fbody);cursor:pointer;border:none;color:inherit}
  h1,h2,h3{margin:0;font-family:var(--fhead)}
  .app{position:relative;z-index:1;max-width:980px;margin:0 auto;padding:20px 16px 130px;min-height:100%}

  /* ---------- HUD primitives ---------- */
  .panel{position:relative;background:linear-gradient(160deg,var(--panel),rgba(5,12,20,.86));
    border:1px solid var(--line);box-shadow:0 0 0 1px rgba(0,0,0,.4),0 0 24px rgba(8,40,60,.5),inset 0 0 32px rgba(8,40,60,.22);
    clip-path:polygon(var(--cut) 0,100% 0,100% calc(100% - var(--cut)),calc(100% - var(--cut)) 100%,0 100%,0 var(--cut));}
  /* corner brackets overlay */
  .brk::after{content:"";position:absolute;inset:6px;pointer-events:none;
    background-image:
      linear-gradient(var(--cy),var(--cy)),linear-gradient(var(--cy),var(--cy)),
      linear-gradient(var(--cy),var(--cy)),linear-gradient(var(--cy),var(--cy)),
      linear-gradient(var(--cy),var(--cy)),linear-gradient(var(--cy),var(--cy)),
      linear-gradient(var(--cy),var(--cy)),linear-gradient(var(--cy),var(--cy));
    background-repeat:no-repeat;
    background-size:18px 2px,2px 18px, 18px 2px,2px 18px, 18px 2px,2px 18px, 18px 2px,2px 18px;
    background-position:left top,left top, right top,right top, left bottom,left bottom, right bottom,right bottom;
    filter:drop-shadow(0 0 4px var(--cy));opacity:.85;}
  .glow{text-shadow:0 0 10px rgba(52,227,255,.55)}

  /* ---------- Top bar ---------- */
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
  .brand{display:flex;align-items:center;gap:13px}
  .brand .logo{width:48px;height:48px;flex:none;filter:drop-shadow(0 0 10px rgba(52,227,255,.6))}
  .brand h1{font-size:32px;font-weight:900;letter-spacing:4px;
    background:linear-gradient(90deg,#bff4ff,#34e3ff 55%,#ff3ea5);-webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 0 12px rgba(52,227,255,.35))}
  .sub{font-family:var(--fhead);font-size:10px;letter-spacing:3px;color:var(--muted);margin-top:2px}

    clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);
    border:1px solid var(--line);opacity:.6;transition:opacity .2s,transform .3s,filter .2s}

  /* ---------- Profile select ---------- */

  .av::before{content:"";position:absolute;inset:0;border:2px solid var(--kc);opacity:.9;

  .av img{width:100%;height:100%;object-fit:cover}
  .kidcard .nm{font-family:var(--fhead);font-size:27px;font-weight:800;letter-spacing:2px;color:var(--kc);
    filter:drop-shadow(0 0 10px var(--kc));text-transform:uppercase}
  .kidcard .cardlv{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:9px;
    font-family:var(--fhead);font-weight:800;font-size:14px;letter-spacing:1px;color:var(--lc);filter:drop-shadow(0 0 3px var(--lc))}
  .kidcard .cardlv svg{flex:none}
  .kidcard .pts{font-size:16px;color:var(--muted);font-weight:700;letter-spacing:1px;margin-top:8px}
  .kidcard .pts b{color:var(--ink)}
  .mini{margin-top:14px;height:5px;background:rgba(2,8,14,.8);overflow:hidden;border-radius:3px}
  .mini > i{display:block;height:100%;background:linear-gradient(90deg,var(--kc),#fff);opacity:.85}

  /* ---------- Power bar ---------- */
  .powerwrap{padding:20px}
  .meter{padding:18px;margin-bottom:14px}
  .meter .ph h3{font-size:14px;letter-spacing:2px;color:var(--cy)}
  /* minor meters (weekly/monthly) - quieter, thinner, no border */
  .meter.minor{padding:12px 16px;margin-bottom:10px}
  .meter.minor .ph{margin-bottom:8px}
  .meter.minor .ph h3{font-size:12px;color:var(--muted)}
  .meter.minor .powerbar{height:16px;border-color:transparent}
  .meter.minor .powerbar::after{display:none}
  .meter.minor .powermeta{font-size:12px;margin-top:8px}
  .meter.minor .powermeta span{font-size:11px}
  .meter.minor::after{display:none} /* no corner brackets on the quieter meters */
  .rcard .val .earned{color:var(--good);text-shadow:0 0 8px rgba(39,255,158,.5);font-size:14px;margin-left:8px;white-space:nowrap}
  .ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:10px;flex-wrap:wrap}
  .ph h3{font-size:14px;letter-spacing:4px;color:var(--cy)}
  .ph .goal{font-family:var(--fhead);font-size:12px;font-weight:700;letter-spacing:1px;color:var(--amber);text-align:right}
  .powerbar{position:relative;height:40px;background:rgba(2,8,14,.92);overflow:hidden;border:1px solid var(--line);
    clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px)}
  .powerfill{position:absolute;inset:0;width:0%;transition:width .7s cubic-bezier(.2,.8,.2,1),background .6s,box-shadow .6s}
  .powerfill::before{content:"";position:absolute;inset:0;
    background:repeating-linear-gradient(105deg,rgba(255,255,255,.22) 0 14px,transparent 14px 30px);
    animation:flow 1.4s linear infinite}
  @keyframes flow{to{background-position:60px 0}}
  /* segment dividers */
  .powerbar::after{content:"";position:absolute;inset:0;pointer-events:none;
    background:repeating-linear-gradient(90deg,transparent 0 calc(10% - 2px),rgba(2,8,14,.9) calc(10% - 2px) 10%)}
  .pf-low{background:linear-gradient(90deg,#2b5468,#3f7d96)}
  .pf-warm{background:linear-gradient(90deg,#ffb13c,#ff7a3c);box-shadow:0 0 20px rgba(255,140,60,.6)}
  .pf-hot{background:linear-gradient(90deg,#27ff9e,#12c47a);box-shadow:0 0 24px rgba(39,255,158,.7);animation:pulse 1.1s ease-in-out infinite}
  .pf-max{background:linear-gradient(90deg,#bff4ff,#34e3ff,#27ff9e);box-shadow:0 0 38px rgba(52,227,255,.95);animation:pulse .45s ease-in-out infinite}
  @keyframes pulse{50%{filter:brightness(1.4)}}
  .powermeta{display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-top:12px;font-size:14px;color:var(--muted);font-weight:700;letter-spacing:.5px}
  .powermeta span{font-family:var(--fhead);font-size:12px;letter-spacing:1px}
  .laggard{color:var(--amber)!important;text-shadow:0 0 8px rgba(255,177,60,.5)}

  /* ---------- Kid view ---------- */
  .back{background:var(--panel2);color:var(--cy);padding:11px 18px;font-family:var(--fhead);font-weight:700;font-size:13px;letter-spacing:2px;margin-bottom:16px;
    border:1px solid var(--line);clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);transition:filter .2s}
  .back:hover{filter:drop-shadow(0 0 8px var(--cy))}
  .kidhead{--kc:var(--cy);display:flex;align-items:center;gap:22px;padding:22px;margin-bottom:18px}
  .kidhead .avwrap{position:relative;flex:none}
  .kidhead .av{width:150px;height:150px;margin:0;font-size:60px;flex:none}
  .kidhead .avwrap .editbadge{position:absolute;bottom:-6px;right:-6px;background:var(--panel2);border:1px solid var(--kc);color:var(--kc);
    font-family:var(--fhead);font-size:10px;font-weight:700;letter-spacing:1px;padding:5px 9px;
    clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);filter:drop-shadow(0 0 6px var(--kc))}
  .kidhead .info{flex:1;min-width:0}
  .kidhead .nm{font-family:var(--fhead);font-size:34px;font-weight:800;letter-spacing:2px;line-height:1;color:var(--kc);
    filter:drop-shadow(0 0 10px var(--kc));text-transform:uppercase}
  .kidhead .tot{font-size:16px;color:var(--muted);font-weight:700;letter-spacing:2px;margin-top:6px}
  .kidhead .tot b{color:var(--cy);font-family:var(--fhead)}

  /* level row */
  .levelrow{display:flex;align-items:center;gap:14px;margin-top:14px}
  .levelrow .lvinfo{min-width:0}
  .levelrow .lvname{font-family:var(--fhead);font-size:18px;font-weight:800;letter-spacing:1px;color:var(--lc);filter:drop-shadow(0 0 3px var(--lc))}
  .levelrow .lvmeta{font-family:var(--fhead);font-size:11px;letter-spacing:2px;color:var(--muted);margin:3px 0 6px}
  .lvbar{height:8px;width:200px;max-width:100%;background:rgba(2,8,14,.9);overflow:hidden;border:1px solid var(--line-soft);
    clip-path:polygon(4px 0,100% 0,100% calc(100% - 4px),calc(100% - 4px) 100%,0 100%,0 4px)}
  .lvbar > i{display:block;height:100%;background:linear-gradient(90deg,var(--lc),#fff);box-shadow:0 0 10px var(--lc)}

  /* compact stats in header */
  .headstats{flex:none;display:flex;flex-direction:column;gap:10px;width:150px}
  .stat{padding:10px 12px;text-align:center}
  .stat .num{font-family:var(--fhead);font-size:24px;font-weight:900;color:var(--cy);line-height:1;filter:drop-shadow(0 0 8px rgba(52,227,255,.4))}
  .stat .lab{font-family:var(--fhead);font-size:9px;letter-spacing:1.5px;color:var(--muted);margin-top:5px}

  /* tighter reading width for the mission list */
  .missionwrap{max-width:680px;margin:0 auto;width:100%}

  @media(max-width:720px){
    .kidhead{flex-wrap:wrap}
    .kidhead .avwrap{order:1}
    .kidhead .info{order:2}
    .kidhead .headstats{order:3;flex-basis:100%;flex-direction:row;width:auto}
    .stat{flex:1;min-width:0}
  }
  @media(max-width:560px){
    .kidhead{flex-direction:column;gap:16px;text-align:center}
    .kidhead .av{width:140px;height:140px}
    .levelrow{justify-content:center}
  }

  /* sibling card */
  .sibcard{--kc:var(--cy);display:flex;align-items:center;gap:16px;padding:16px;margin-bottom:13px;cursor:pointer;transition:transform .12s,filter .2s}
  .sibcard:active{transform:scale(.985)}
  .sibcard:hover{filter:drop-shadow(0 0 12px rgba(52,227,255,.25))}
  .sibcard .av{width:74px;height:74px;margin:0;font-size:30px;flex:none}
  .sibcard .sname{font-family:var(--fhead);font-size:13px;letter-spacing:1px;color:var(--cy);margin-bottom:5px}
  .sibcard .sname b{color:var(--kc)}
  .sibcard .slv{font-family:var(--fhead);font-size:16px;font-weight:800;color:var(--lc);filter:drop-shadow(0 0 3px var(--lc))}
  .sibcard .sstats{font-size:14px;color:var(--muted);font-weight:600;margin-top:3px;letter-spacing:.5px}
  .sibcard .go{margin-left:auto;font-family:var(--fhead);font-size:22px;color:var(--cy);filter:drop-shadow(0 0 6px var(--cy))}

  .rewardrow{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
  @media(max-width:560px){.rewardrow{grid-template-columns:1fr}}
  .rcard{padding:16px}
  .rcard .lab{font-family:var(--fhead);font-size:11px;letter-spacing:2px;color:var(--muted)}
  .rcard .val{font-size:19px;font-weight:700;margin:5px 0 11px;letter-spacing:.5px}
  .notecard{padding:16px 18px;margin-bottom:20px;border-color:rgba(255,210,60,.4);box-shadow:0 0 24px rgba(255,177,60,.12),inset 0 0 30px rgba(255,177,60,.06)}

  .notecard .ntext{font-size:19px;font-weight:600;line-height:1.35;color:var(--ink)}

  .rcard.done .rb > i{background:linear-gradient(90deg,var(--good),#fff);box-shadow:0 0 12px var(--good)}

  .section{margin-bottom:24px}

  /* ---------- Celebration ---------- */

    filter:drop-shadow(0 0 24px rgba(52,227,255,.6));animation:celebpop .5s cubic-bezier(.2,1.5,.4,1)}
  @keyframes celebpop{0%{transform:scale(.4) skewX(8deg);opacity:0}60%{opacity:1}100%{transform:scale(1);opacity:1}}

  /* ---------- Full-screen chore editor ---------- */
  .fs{position:fixed;inset:0;z-index:75;overflow:auto;padding:20px 16px 60px;
    background-color:var(--bg0);
    background-image:radial-gradient(1200px 760px at 50% -8%, #0c2236 0%, var(--bg1) 42%, var(--bg0) 100%);
    background-attachment:fixed; background-repeat:no-repeat}
  .fshead{display:flex;align-items:center;justify-content:space-between;gap:14px;max-width:1100px;margin:0 auto 18px}
  .fshead h2{color:var(--cy);letter-spacing:3px;font-size:22px;filter:drop-shadow(0 0 8px rgba(52,227,255,.4))}
  .fsgrid{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:760px){.fsgrid{grid-template-columns:1fr}}
  .bucket{padding:16px}
  .bktitle{font-family:var(--fhead);font-size:14px;font-weight:800;letter-spacing:2px;color:var(--cy);text-transform:uppercase;margin-bottom:12px}
  .bktitle span{color:var(--muted)}
  .bklist{min-height:54px;border:1px dashed transparent;transition:border-color .15s,background .15s;padding:2px}
  .bklist.dragover{border-color:var(--cy);background:rgba(52,227,255,.07)}
  .bkempty{color:var(--muted);font-style:italic;letter-spacing:.5px;padding:14px 6px;font-size:14px}
  .crow{display:flex;align-items:center;gap:8px;margin-bottom:9px;background:rgba(2,8,14,.7);border:1px solid var(--line-soft);padding:8px;
    clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px)}
  .crow.dragging{opacity:.4}
  .crow .grip{cursor:grab;color:var(--muted);font-size:16px;flex:none;padding:0 2px;letter-spacing:-3px}
  .crow input,.crow select{padding:8px 9px!important;font-size:15px!important}
  .crow .cn{flex:1;min-width:60px}
  .crow .cp{width:58px;flex:none;text-align:center}
  .crow .cm{width:158px;flex:none}
  .crow .cx{flex:none;width:32px;height:32px;background:rgba(58,18,34,.7);border:1px solid #7f1d44;color:#ff9ec4;font-size:18px;font-weight:800;
    clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px)}
  .bkadd{display:flex;gap:8px;margin-top:10px}
  .bkadd textarea{flex:1;min-height:42px;height:42px;font-size:15px}
  @media(max-width:520px){
    .crow{flex-wrap:wrap}
    .crow .cn{flex:1 1 100%;order:1}
    .crow .grip{order:0}
    .crow .cp{order:2}
    .crow .cm{order:3;flex:1}
    .crow .cx{order:4}
  }

  /* ---------- Modal / admin ---------- */
  .overlay{position:fixed;inset:0;background:rgba(2,5,11,.78);backdrop-filter:blur(5px);z-index:65;display:grid;place-items:center;padding:18px}
  .modal{width:100%;max-width:580px;max-height:90vh;overflow:auto;padding:24px}
  .modal::-webkit-scrollbar{width:8px}.modal::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}
  .modal h2{font-size:22px;font-weight:800;letter-spacing:3px;margin-bottom:18px;color:var(--cy);text-transform:uppercase;filter:drop-shadow(0 0 8px rgba(52,227,255,.4))}
  .tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
  .tab{background:var(--panel2);color:var(--muted);padding:10px 14px;font-family:var(--fhead);font-weight:700;font-size:12px;letter-spacing:1px;border:1px solid var(--line-soft);
    clip-path:polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px)}
  .tab.active{background:linear-gradient(120deg,var(--cy-deep),#0a4a5c);color:#eaffff;border-color:var(--cy);filter:drop-shadow(0 0 8px rgba(52,227,255,.4))}
  label{display:block;font-family:var(--fhead);font-size:11px;font-weight:700;color:var(--muted);margin:14px 0 6px;letter-spacing:1.5px;text-transform:uppercase}
  input[type=text],input[type=number],input[type=password],select,textarea{
    width:100%;background:rgba(2,8,14,.9);border:1px solid var(--line);padding:12px;color:var(--ink);font-family:var(--fbody);font-size:17px;font-weight:600;
    clip-path:polygon(7px 0,100% 0,100% calc(100% - 7px),calc(100% - 7px) 100%,0 100%,0 7px)}
  textarea{resize:vertical;line-height:1.5;min-height:90px}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--cy);box-shadow:0 0 0 1px var(--cy)}
  .btn{background:linear-gradient(120deg,var(--cy-deep),#0a4a5c);color:#eaffff;padding:13px 18px;font-family:var(--fhead);font-weight:700;font-size:15px;letter-spacing:1.5px;transition:filter .2s;
    clip-path:polygon(9px 0,100% 0,100% calc(100% - 9px),calc(100% - 9px) 100%,0 100%,0 9px)}
  .btn:hover{filter:brightness(1.2) drop-shadow(0 0 8px var(--cy))}
  .btn.full{width:100%}
  .btn.ghost{background:var(--panel2);border:1px solid var(--line);color:var(--cy)}
  .btn.danger{background:linear-gradient(120deg,#5a1230,#3a0f20);color:#ff9ec4;border:1px solid #7f1d44}
  .btn.sm{padding:9px 13px;font-size:12px}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .grow{flex:1}
  .listitem{display:flex;gap:10px;align-items:center;background:rgba(2,8,14,.7);border:1px solid var(--line-soft);padding:12px;margin-bottom:10px;
    clip-path:polygon(9px 0,100% 0,100% calc(100% - 9px),calc(100% - 9px) 100%,0 100%,0 9px)}
  .pill{font-family:var(--fhead);font-size:11px;font-weight:700;padding:4px 9px;background:rgba(2,18,28,.8);border:1px solid var(--line-soft);color:var(--muted);letter-spacing:1px}
  .daysrow{display:flex;gap:6px;flex-wrap:wrap}
  .daytog{padding:9px 11px;border:1px solid var(--line-soft);background:rgba(2,8,14,.8);color:var(--muted);font-family:var(--fhead);font-weight:700;font-size:12px;letter-spacing:1px}
  .daytog.on{background:linear-gradient(120deg,var(--cy-deep),#0a4a5c);border-color:var(--cy);color:#eaffff}
  .avpool{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
  .avopt{width:66px;height:66px;object-fit:cover;border:2px solid var(--line-soft);background:var(--panel2);
    clip-path:polygon(9px 0,100% 0,100% calc(100% - 9px),calc(100% - 9px) 100%,0 100%,0 9px)}
  .avopt.sel{border-color:var(--cy);filter:drop-shadow(0 0 8px var(--cy))}
  .avdel{position:relative}
  .hint{font-size:14px;color:var(--muted);margin-top:6px;letter-spacing:.5px}
  .linkbox{font-family:var(--fbody);font-size:13px;color:var(--cy);background:rgba(2,8,14,.9);border:1px solid var(--line-soft);padding:8px 10px;margin-top:6px;word-break:break-all}
  .pinpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:280px;margin:16px auto 0}
  .pinpad button{background:var(--panel2);border:1px solid var(--line);color:var(--cy);padding:20px;font-family:var(--fhead);font-size:24px;font-weight:800;
    clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);transition:filter .15s}
  .pinpad button:active{filter:drop-shadow(0 0 10px var(--cy)) brightness(1.3)}
  .pinpad .ghost{font-size:14px;letter-spacing:1px}
  .pindots{display:flex;gap:16px;justify-content:center;margin:8px 0 4px}
  .pindots i{width:18px;height:18px;background:rgba(2,8,14,.9);border:2px solid var(--line);transform:rotate(45deg)}
  .pindots i.f{background:var(--cy);border-color:var(--cy);box-shadow:0 0 12px var(--cy)}
  .swatch{width:34px;height:34px;border:2px solid var(--line-soft);clip-path:polygon(7px 0,100% 0,100% calc(100% - 7px),calc(100% - 7px) 100%,0 100%,0 7px)}
  .swatch.sel{border-color:#fff;filter:drop-shadow(0 0 8px currentColor)}
  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:var(--panel2);border:1px solid var(--cy);
    padding:13px 20px;font-family:var(--fhead);font-weight:700;font-size:14px;letter-spacing:1px;z-index:90;opacity:0;transition:opacity .25s,transform .25s;
    clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px)}
</style>
</head>

/* ---------- Storage abstraction ---------- */
const STORE_KEY = 'levelup_state_v1';
const REMOTE = '/.netlify/functions/state'; // Netlify Blobs-backed shared store (when deployed)
// Hybrid store: shared Netlify Blob when deployed, localStorage as cache + offline/local fallback.
const Store = {
  remoteOK:false,
  async load(){
    // try the shared cloud store first
    try{
      const r=await fetch(REMOTE,{cache:'no-store'});
      if(r.ok){
        this.remoteOK=true;
        const data=await r.json();              // null when nothing stored yet
        if(data){ try{ localStorage.setItem(STORE_KEY,JSON.stringify(data)); }catch(_){} return data; }
        return null;
      }
    }catch(e){ /* not deployed / offline -> fall back */ }
    try{ const raw=localStorage.getItem(STORE_KEY); return raw?JSON.parse(raw):null; }catch(e){ console.error('load',e); return null; }
  },
  _t:null,
  save(state){
    // 1) cache locally immediately (synchronous, instant) so the UI never waits
    try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }catch(e){ console.error('save',e); }
    // 2) push to the shared cloud store in the background, debounced so rapid taps send once
    clearTimeout(this._t);
    this._t=setTimeout(()=>this._push(), 300);
    return Promise.resolve(); // resolves instantly; callers never block on the network
  },
  _push(){
    try{
      fetch(REMOTE,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(state)})
        .then(r=>{ if(r&&r.ok) this.remoteOK=true; })
        .catch(()=>{ if(this.remoteOK) toast('OFFLINE — SAVED LOCALLY'); });
    }catch(e){}
  },
  flush(){
    // best-effort synchronous save when the app is backgrounded/closed
    clearTimeout(this._t);
    try{
      const body=JSON.stringify(state);
      if(navigator.sendBeacon){ navigator.sendBeacon(REMOTE, new Blob([body],{type:'application/json'})); }
      else { this._push(); }
    }catch(e){}
  }
};

/* ---------- Mission stats ---------- */
function weekStart(){ const d=new Date(); const day=(d.getDay()+6)%7; d.setHours(0,0,0,0); d.setDate(d.getDate()-day); return d; }
function missionsThisWeek(k){ const start=weekStart(); let n=0; for(const [date,c] of Object.entries(k.history||{})){ const dd=new Date(date+'T00:00:00'); if(dd>=start) n+=(c||0); } return n; }
function bumpHistory(k,delta){ const d=todayStr(); if(!k.history)k.history={}; k.history[d]=Math.max(0,(k.history[d]||0)+delta); if(k.history[d]===0)delete k.history[d]; }

function findKid(q){ return state.kids.find(k=>k.id===q) || state.kids.find(k=>slug(k.name)===slug(q)); }
function migrate(){ state.kids.forEach(k=>{ if(!k.completions)k.completions={}; if(typeof k.points!=='number')k.points=0; if(!k.history)k.history={}; if(typeof k.lifetimeMissions!=='number')k.lifetimeMissions=0; if(!k.note)k.note={date:'',from:'',reply:'',seen:false}; }); if(!state.avatars)state.avatars=[];
  if(!state.messages) state.messages={ten:[...SILLY],fifty:[...SILLY_50]};
  if(!Array.isArray(state.messages.ten)||!state.messages.ten.length) state.messages.ten=[...SILLY];
  if(!Array.isArray(state.messages.fifty)||!state.messages.fifty.length) state.messages.fifty=[...SILLY_50];
  migrateChores();
  migrateRewards();
}
// Convert old reward model (small/main + familyRewards) to daily/weekly/monthly/overarching
function migrateRewards(){
  const r=state.rewards||{};
  if(!(r.daily&&r.weekly&&r.monthly&&r.overarching)){
    const fr=state.familyRewards||[];
    state.rewards={
      daily:{interval:(r.small&&r.small.threshold)||20, label:(r.small&&r.small.label)||'30 min screen time'},
      weekly:{threshold:(fr[0]&&fr[0].threshold)||100, label:(fr[0]&&fr[0].label)||'Friday movie night'},
      monthly:{threshold:(fr[1]&&fr[1].threshold)||300, label:(fr[1]&&fr[1].label)||'Day trip out'},
      overarching:{threshold:(fr[fr.length-1]&&fr[fr.length-1].threshold)||(r.main&&r.main.threshold)||1000, label:(fr[fr.length-1]&&fr[fr.length-1].label)||(r.main&&r.main.label)||'Big family reward'}
    };
    delete state.familyRewards;
  }
  // per-kid meter baselines + daily tracker (start meters at current points so they don't insta-complete)
  state.kids.forEach(k=>{
    if(typeof k.weeklyBase!=='number') k.weeklyBase=k.points;
    if(typeof k.monthlyBase!=='number') k.monthlyBase=k.points;
    if(!k.daily||typeof k.daily!=='object') k.daily={date:'',count:0};
  });
  if(typeof state.overReached!=='boolean'){
    state.overReached = state.kids.length>0 && state.kids.every(k=>k.points>=state.rewards.overarching.threshold);
  }
}
// Chore day-groups
const GROUPS=['everyday','weekday','sat','sun'];
const GROUP_LABEL={everyday:'Every Day',weekday:'Mon–Fri',sat:'Saturday',sun:'Sunday'};
const SLOTS=['morning','evening'];
const SLOT_LABEL={morning:'Morning',evening:'Evening'};
// Convert any old day-array chores to the group+slot model
function migrateChores(){
  if(!Array.isArray(state.chores)) { state.chores=[]; return; }
  state.chores = state.chores.flatMap(c=>{
    if(c.group) return [c];                       // already new model
    const set=new Set(c.days||[]);
    const slot=c.slot==='evening'?'evening':'morning';
    const pts=Math.max(1,c.points||1);
    const hasWk=[1,2,3,4,5].some(d=>set.has(d)), hasSat=set.has(6), hasSun=set.has(0);
    let groups=[];
    if(hasWk&&hasSat&&hasSun) groups=['everyday'];
    else { if(hasWk)groups.push('weekday'); if(hasSat)groups.push('sat'); if(hasSun)groups.push('sun'); }
    if(!groups.length) groups=['weekday'];
    return groups.map((g,i)=>({id:i===0?(c.id||uid()):uid(),name:c.name,group:g,slot,points:pts}));
  });
}
function todayGroup(){ const d=new Date().getDay(); return d===0?'sun':d===6?'sat':'weekday'; }
function choresFor(group,slot){ return state.chores.filter(c=>c.group===group && c.slot===slot); }
function pruneOldCompletions(){
  const t=todayStr();
  // checklist only cares about today's completions
  state.kids.forEach(k=>Object.keys(k.completions).forEach(d=>{ if(d!==t)delete k.completions[d]; }));
  // keep mission history for the last 14 days
  const cutoff=new Date(); cutoff.setHours(0,0,0,0); cutoff.setDate(cutoff.getDate()-13);
  state.kids.forEach(k=>Object.keys(k.history||{}).forEach(d=>{ if(new Date(d+'T00:00:00')<cutoff) delete k.history[d]; }));
  // daily notes clear each day
  state.kids.forEach(k=>{ if(k.note && k.note.date!==t) k.note={date:'',from:'',reply:'',seen:false}; });
  Store.save(state);
}

/* ---------- Team meters (min-based; both kids must reach) ---------- */
function metersData(){
  const k=state.kids, r=state.rewards;
  const minOf=fn=> k.length?Math.min(...k.map(fn)):0;
  return [
    {key:'weekly', name:'WEEKLY',  label:r.weekly.label,  cur:Math.max(0,minOf(x=>x.points-(x.weeklyBase||0))),  thr:r.weekly.threshold,  resets:true,  per:k.map(x=>({n:x.name,v:Math.max(0,x.points-(x.weeklyBase||0))}))},
    {key:'monthly',name:'MONTHLY', label:r.monthly.label, cur:Math.max(0,minOf(x=>x.points-(x.monthlyBase||0))), thr:r.monthly.threshold, resets:true,  per:k.map(x=>({n:x.name,v:Math.max(0,x.points-(x.monthlyBase||0))}))},
    {key:'over',   name:'OVERARCHING', label:r.overarching.label, cur:minOf(x=>x.points), thr:r.overarching.threshold, resets:false, per:k.map(x=>({n:x.name,v:x.points}))}
  ];
}
function fillClassFor(pct){ return pct>=80?'pf-max':pct>=60?'pf-hot':pct>=40?'pf-warm':'pf-low'; }
function renderMeters(){
  document.querySelectorAll('[data-meters]').forEach(c=>{
    c.innerHTML=metersData().map(m=>{
      const pct=Math.max(0,Math.min(100,Math.round(m.cur/Math.max(1,m.thr)*100)));
      const behind=[...m.per].sort((a,b)=>a.v-b.v)[0];
      const need=Math.max(0,m.thr-(behind?behind.v:0));
      let meta=m.per.map(p=>`<span>${esc(p.n)}: ${p.v}/${m.thr}</span>`).join('');
      if(m.per.length>=2 && need>0) meta+=`<span class="laggard">${esc(behind.n)} NEEDS ${need} MORE</span>`;
      return `<div class="meter panel brk ${m.key==='over'?'major':'minor'}">
        <div class="ph"><h3>${esc(m.label)}</h3></div>
        <div class="powerbar"><div class="powerfill ${fillClassFor(pct)}" style="width:${pct}%"></div></div>
        <div class="powermeta">${meta}</div>
      </div>`;
    }).join('');
  });
}

async function toggleChore(chore,el){
  const k=state.kids.find(x=>x.id===currentKidId); if(!k) return;
  const day=todayStr(); if(!k.completions[day])k.completions[day]=[];
  const arr=k.completions[day]; const idx=arr.indexOf(chore.id); const before=k.points;
  const checking=idx===-1;
  if(checking){ arr.push(chore.id); k.points+=chore.points; k.lifetimeMissions=(k.lifetimeMissions||0)+1; bumpHistory(k,1); }
  else { arr.splice(idx,1); k.points=Math.max(0,k.points-chore.points); k.lifetimeMissions=Math.max(0,(k.lifetimeMissions||0)-1); bumpHistory(k,-1); }

  let dailyCrossed=false, teamMsg=null;
  if(checking){
    // daily reward: count how many N-pt intervals were crossed; badge stays for today
    const intl=Math.max(1,state.rewards.daily.interval||20);
    const crossed=Math.floor(k.points/intl)-Math.floor(before/intl);
    if(crossed>0){
      if(!k.daily||k.daily.date!==day) k.daily={date:day,count:0};
      k.daily.count+=crossed; dailyCrossed=true;
    }
    // team meters: complete only when EVERY kid reaches the threshold (min-based)
    const r=state.rewards, kids=state.kids, minOf=fn=>kids.length?Math.min(...kids.map(fn)):0;
    if(r.weekly.threshold>0 && minOf(x=>x.points-(x.weeklyBase||0))>=r.weekly.threshold){ teamMsg='WEEKLY GOAL! · '+r.weekly.label; kids.forEach(x=>x.weeklyBase=x.points); }
    if(r.monthly.threshold>0 && minOf(x=>x.points-(x.monthlyBase||0))>=r.monthly.threshold){ teamMsg='MONTHLY GOAL! · '+r.monthly.label; kids.forEach(x=>x.monthlyBase=x.points); }
    if(r.overarching.threshold>0 && minOf(x=>x.points)>=r.overarching.threshold && !state.overReached){ teamMsg='GOAL UNLOCKED! · '+r.overarching.label; state.overReached=true; }
  }
  renderKid(); Store.save(state);

  if(!checking) return;
  // one celebration, by priority: team goal > slot clear > 50 > daily reward > 10
  if(teamMsg){ celebrate(teamMsg,true); return; }
  const tg=todayGroup();
  const slotList=state.chores.filter(c=>c.slot===chore.slot && (c.group==='everyday'||c.group===tg));
  if(slotList.length>0 && slotList.every(c=>arr.includes(c.id))){ celebrateSlot(chore.slot); return; }
  if(Math.floor(k.points/50)>Math.floor(before/50)){ celebrate(nextMessage('fifty'),true); return; }
  if(dailyCrossed){ celebrate('DAILY REWARD! · '+state.rewards.daily.label,true); return; }
  if(Math.floor(k.points/10)>Math.floor(before/10)){ celebrate(nextMessage('ten'),false); return; }
}
const SLOT_DONE=['ALL DONE!','MISSIONS CLEARED!','CRUSHED IT!','FLAWLESS RUN!','ZONE COMPLETE!','NAILED IT!'];
function celebrateSlot(slot){
  const label=slot==='morning'?'MORNING':'EVENING';
  celebrate(label+' · '+SLOT_DONE[Math.floor(Math.random()*SLOT_DONE.length)], true);
}
// no-repeat "bag": shuffles the list and serves each once before reshuffling
let _msgBag={ten:[],fifty:[]};
function _shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function nextMessage(kind){
  const pool=(state.messages&&state.messages[kind]&&state.messages[kind].length)?state.messages[kind]:(kind==='fifty'?SILLY_50:SILLY);
  if(!_msgBag[kind]||!_msgBag[kind].length) _msgBag[kind]=_shuffle([...pool]);
  return _msgBag[kind].pop();
}
// celebration sound (bundled data URI in window.LEVELUP_SFX)
let _sfx=null;
function playSfx(){
  try{
    if(typeof LEVELUP_SFX==='undefined'||!LEVELUP_SFX) return;
    if(!_sfx){ _sfx=new Audio(LEVELUP_SFX); _sfx.volume=0.7; }
    _sfx.currentTime=0;
    const p=_sfx.play(); if(p&&p.catch) p.catch(()=>{});
  }catch(e){}
}
let _celebT=[];
function celebrate(message,big){
  const c=$('#celebrate'),m=$('#celebMsg');
  _celebT.forEach(clearTimeout); _celebT=[];
  m.textContent=message;
  c.classList.remove('hidden','out');
  playSfx();
  // restart the pop animation each time
  m.style.animation='none'; void m.offsetWidth; m.style.animation='';
  // schedule fade-out FIRST so the overlay always clears, even if confetti errors
  const hold=big?2200:1500;
  _celebT.push(setTimeout(()=>c.classList.add('out'), hold));            // begin fade
  _celebT.push(setTimeout(()=>{ c.classList.add('hidden'); c.classList.remove('out'); }, hold+520)); // hide after fade
  // confetti (canvas-confetti) — guarded so a missing/erroring lib can't freeze the UI
  try{
    if(typeof confetti!=='function') return;
    const cols=['#34e3ff','#27ff9e','#ff3ea5','#ffd23c','#a78bfa'];
    const end=Date.now()+(big?1500:900);
    (function frame(){
      confetti({particleCount:big?7:4,spread:75,startVelocity:big?58:44,origin:{x:Math.random(),y:Math.random()*0.4+0.1},colors:cols});
      if(Date.now()<end) requestAnimationFrame(frame);
    })();
    if(big){
      confetti({particleCount:160,spread:130,startVelocity:62,origin:{y:.5},colors:cols});
      confetti({particleCount:90,angle:60,spread:80,origin:{x:0,y:.65},colors:cols});
      confetti({particleCount:90,angle:120,spread:80,origin:{x:1,y:.65},colors:cols});
    } else {
      confetti({particleCount:90,spread:95,startVelocity:50,origin:{y:.55},colors:cols});
    }
  }catch(e){ console.error('confetti error',e); }
}

function modal(html){
  const r=$('#modalRoot'); r.innerHTML=`<div class="overlay" id="ovl"><div class="modal panel brk">${html}</div></div>`;
  const ovl=$('#ovl'); let downOnOvl=false;
  // only close on a deliberate click that BOTH starts and ends on the backdrop
  ovl.addEventListener('pointerdown',e=>{ downOnOvl=(e.target===ovl); });
  ovl.addEventListener('click',e=>{ if(e.target===ovl && downOnOvl) closeModal(); downOnOvl=false; });
}
function closeModal(){ $('#modalRoot').innerHTML=''; }

let pinBuffer='',pinMode='',pinFirst='';
async function openAdminGate(){ pinMode=state.pinHash?'enter':'set'; pinFirst=''; pinBuffer=''; renderPinPad(); }
function renderPinPad(){
  const title=pinMode==='enter'?'ENTER PIN':(pinFirst===''?'CREATE 4-DIGIT PIN':'CONFIRM PIN');
  modal(`<h2>${title}</h2><div class="pindots" id="pinDots"></div>
    <div class="pinpad">${[1,2,3,4,5,6,7,8,9].map(n=>`<button data-n="${n}">${n}</button>`).join('')}
    <button class="ghost" id="pinClear">&#9003;</button><button data-n="0">0</button><button class="ghost" id="pinCancel">ESC</button></div>
    <div class="hint" style="text-align:center" id="pinHint"></div>`);
  drawDots();
  $('#modalRoot').querySelectorAll('[data-n]').forEach(b=>b.onclick=()=>pinPress(b.dataset.n));
  $('#pinClear').onclick=()=>{ pinBuffer=pinBuffer.slice(0,-1); drawDots(); };
  $('#pinCancel').onclick=closeModal;
}
function drawDots(){ $('#pinDots').innerHTML=[0,1,2,3].map(i=>`<i class="${i<pinBuffer.length?'f':''}"></i>`).join(''); }
async function pinPress(n){ if(pinBuffer.length>=4)return; pinBuffer+=n; drawDots(); if(pinBuffer.length===4) setTimeout(handlePinComplete,150); }
async function handlePinComplete(){
  if(pinMode==='set'){
    if(pinFirst===''){ pinFirst=pinBuffer; pinBuffer=''; renderPinPad(); return; }
    if(pinFirst!==pinBuffer){ pinFirst=''; pinBuffer=''; renderPinPad(); $('#pinHint').textContent='PINS DID NOT MATCH'; return; }
    state.pinHash=await hashPin(pinBuffer); await Store.save(state); openAdmin();
  } else {
    const h=await hashPin(pinBuffer);
    if(h===state.pinHash) openAdmin(); else { pinBuffer=''; drawDots(); $('#pinHint').textContent='WRONG PIN'; }
  }
}

/* ---------- Full-screen bulk chore editor ---------- */
let _dragId=null;
const bk=(g,s)=>g+'|'+s;
function findChore(id){ return state.chores.find(c=>c.id===id); }
function deleteChore(id){ state.chores=state.chores.filter(c=>c.id!==id);
  state.kids.forEach(k=>Object.keys(k.completions).forEach(d=>{ k.completions[d]=k.completions[d].filter(x=>x!==id); })); }
function openChoreEditor(){
  $('#editorRoot').innerHTML=`<div class="fs">
    <div class="fshead">
      <div><h2>CHORE EDITOR</h2><div class="sub">Paste a list, set points, drag between slots</div></div>
      <button class="btn" id="fsDone">DONE</button>
    </div>
    <div class="fsgrid" id="fsGrid"></div>
  </div>`;
  $('#fsDone').onclick=closeChoreEditor;
  renderEditorGrid();
}
function closeChoreEditor(){ $('#editorRoot').innerHTML=''; if($('#adminBody')) renderAdminBody(); }
function choreRowHTML(c){
  const opts=GROUPS.map(g=>SLOTS.map(s=>`<option value="${bk(g,s)}"${c.group===g&&c.slot===s?' selected':''}>${GROUP_LABEL[g]} · ${SLOT_LABEL[s]}</option>`).join('')).join('');
  return `<div class="crow" draggable="true" data-id="${c.id}">
    <span class="grip" title="Drag">⠿</span>
    <input class="cn" data-id="${c.id}" type="text" value="${esc(c.name)}">
    <input class="cp" data-id="${c.id}" type="number" min="1" value="${c.points}" title="Points">
    <select class="cm" data-id="${c.id}" title="Move to…">${opts}</select>
    <button class="cx" data-id="${c.id}" title="Delete">×</button>
  </div>`;
}
function renderEditorGrid(){
  const grid=$('#fsGrid'); if(!grid) return;
  grid.innerHTML=GROUPS.map(g=>SLOTS.map(s=>{
    const rows=choresFor(g,s).map(choreRowHTML).join('');
    return `<div class="bucket panel brk">
      <div class="bktitle">${GROUP_LABEL[g]} <span>· ${SLOT_LABEL[s]}</span></div>
      <div class="bklist" data-drop="${bk(g,s)}">${rows||'<div class="bkempty">Drop or add chores here</div>'}</div>
      <div class="bkadd">
        <textarea data-add="${bk(g,s)}" rows="1" placeholder="Paste chores, one per line…"></textarea>
        <button class="btn sm" data-addbtn="${bk(g,s)}">ADD</button>
      </div>
    </div>`;
  }).join('')).join('');
  wireEditor();
}
function wireEditor(){
  const grid=$('#fsGrid');
  grid.querySelectorAll('.cn').forEach(el=>{
    el.oninput=()=>{ const c=findChore(el.dataset.id); if(c) c.name=el.value; };
    el.onblur=async()=>{ const c=findChore(el.dataset.id); if(c){ c.name=el.value.trim()||c.name; el.value=c.name; await Store.save(state); } };
  });
  grid.querySelectorAll('.cp').forEach(el=>el.onchange=async()=>{ const c=findChore(el.dataset.id); if(c){ c.points=Math.max(1,parseInt(el.value)||1); el.value=c.points; await Store.save(state); } });
  grid.querySelectorAll('.cm').forEach(el=>el.onchange=async()=>{ const c=findChore(el.dataset.id); if(c){ const [g,s]=el.value.split('|'); c.group=g; c.slot=s; await Store.save(state); renderEditorGrid(); } });
  grid.querySelectorAll('.cx').forEach(el=>el.onclick=async()=>{ deleteChore(el.dataset.id); await Store.save(state); renderEditorGrid(); });
  grid.querySelectorAll('[data-addbtn]').forEach(btn=>btn.onclick=async()=>{
    const key=btn.dataset.addbtn, ta=grid.querySelector(`[data-add="${key}"]`);
    const lines=ta.value.split('\n').map(s=>s.trim()).filter(Boolean);
    if(!lines.length){ ta.focus(); return; }
    const [g,s]=key.split('|');
    lines.forEach(name=>state.chores.push({id:uid(),name,group:g,slot:s,points:1}));
    ta.value=''; await Store.save(state); renderEditorGrid();
  });
  // drag + drop between buckets
  grid.querySelectorAll('.crow').forEach(row=>{
    row.ondragstart=e=>{ _dragId=row.dataset.id; e.dataTransfer.effectAllowed='move'; try{e.dataTransfer.setData('text/plain',row.dataset.id);}catch(_){} row.classList.add('dragging'); };
    row.ondragend=()=>{ _dragId=null; row.classList.remove('dragging'); grid.querySelectorAll('.bklist').forEach(l=>l.classList.remove('dragover')); };
  });
  grid.querySelectorAll('.bklist').forEach(list=>{
    list.ondragover=e=>{ e.preventDefault(); list.classList.add('dragover'); };
    list.ondragleave=()=>list.classList.remove('dragover');
    list.ondrop=async e=>{ e.preventDefault(); list.classList.remove('dragover'); const id=_dragId||(e.dataTransfer&&e.dataTransfer.getData('text/plain')); const c=findChore(id); if(c){ const [g,s]=list.dataset.drop.split('|'); c.group=g; c.slot=s; await Store.save(state); renderEditorGrid(); } };
  });
}

async function delKid(id){ if(!confirm('Remove this child? Their points and progress will be deleted.'))return; state.kids=state.kids.filter(k=>k.id!==id); await Store.save(state); renderAdminBody(); renderHome(); }
function onAvatarUpload(e){ const files=[...e.target.files]; if(!files.length)return; let pending=files.length;
  files.forEach(f=>{ const r=new FileReader(); r.onload=async()=>{ const img=await squareDownscale(r.result); state.avatars.push(img); if(--pending===0){ await Store.save(state); renderAdminBody(); toast('AVATARS ADDED'); } }; r.readAsDataURL(f); }); }
function squareDownscale(dataUrl,size=256){ return new Promise(res=>{ const img=new Image(); img.onload=()=>{ const c=document.createElement('canvas'); c.width=size; c.height=size; const ctx=c.getContext('2d'); const m=Math.min(img.width,img.height),sx=(img.width-m)/2,sy=(img.height-m)/2; ctx.drawImage(img,sx,sy,m,m,0,0,size,size); res(c.toDataURL('image/jpeg',0.82)); }; img.onerror=()=>res(dataUrl); img.src=dataUrl; }); }
async function delAvatar(i){ const url=state.avatars[i]; state.avatars.splice(i,1); state.kids.forEach(k=>{ if(k.avatar===url)k.avatar=null; }); await Store.save(state); renderAdminBody(); renderHome(); }

function zeroKid(k){ k.points=0; k.completions={}; k.weeklyBase=0; k.monthlyBase=0; k.daily={date:'',count:0}; }
async function resetKid(id){ const k=state.kids.find(x=>x.id===id); if(!k)return; if(!confirm(`Reset ${k.name}'s points to 0?`))return; zeroKid(k); state.overReached = state.kids.length>0 && state.kids.every(x=>x.points>=state.rewards.overarching.threshold); await Store.save(state); toast(k.name.toUpperCase()+' RESET'); renderHome(); renderAdminBody(); }
