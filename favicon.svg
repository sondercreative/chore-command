<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a7f3d0"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="2" y="2" width="60" height="60" rx="15" fill="url(#bg)"/>
  <!-- stacked level-up chevrons -->
  <g fill="none" stroke="url(#bolt)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <polyline points="18,30 32,17 46,30"/>
    <polyline points="18,46 32,33 46,46" opacity="0.55"/>
  </g>
</svg>
